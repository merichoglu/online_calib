# paths
data_stereo:
  raw_dir: ../data_stereo/raw
  proc_dir: ../data_stereo/processed

data_vo:
  # both images and calib live under the same root folder
  base_dir: data_vo/dataset
  calib_dir: data_vo/dataset
  sequence: '01'
  cam: 0

# feature params
feature:
  type: SIFT
  n_features: 1500

# matcher params
matcher:
  ratio_test: 0.75
  max_row_diff: 2

# RANSAC / pose
ransac:
  prob: 0.999
  thresh: 0.75

# smoothing for EKF
smoothing:
  alpha: 0.10  # between 0 (no updates) and 1 (no smoothing)
  rot_thresh_deg: 5.0
  warmup_frames: 15 # number of frames to collect before filtering

# --------------------------------------
# grid-based match collection
collection:
  # how many rows/cols to split the image into
  grid_rows:    8
  grid_cols:   16
  # maximum matches to keep per cell before scaling by rho
  max_per_cell: 200

gnc:
  max_iters: 20

# fisheye camera intrinsics for checkerboard undistortion/matching
intrinsics:
  K: [[550.0395,   0.0,   960.0],
      [  0.0, 533.372225, 768.0],
      [  0.0,    0.0,     1.0]]
  D: [0.0, 0.0, 0.0, 0.0]
  height: 1536
  width: 1920
