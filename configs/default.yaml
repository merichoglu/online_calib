# paths
data_stereo:
  raw_dir: ../data_stereo/raw
  proc_dir: ../data_stereo/processed

data_vo:
  # both images and calib live under the same root folder
  base_dir: data_vo/dataset
  calib_dir: data_vo/dataset
  sequence: '01'
  cam: 0

# feature params
feature:
  type: ORB
  n_features: 1000

# matcher params
matcher:
  ratio_test: 0.65
  max_row_diff: 2

# RANSAC / pose
ransac:
  prob: 0.999
  thresh: 1.0

# smoothing for EKF
smoothing:
  alpha: 0.1  # between 0 (no updates) and 1 (no smoothing)

# --------------------------------------
# grid-based match collection
collection:
  # how many rows/cols to split the image into
  grid_rows:    8
  grid_cols:   16
  # maximum matches to keep per cell before scaling by rho
  max_per_cell: 200
